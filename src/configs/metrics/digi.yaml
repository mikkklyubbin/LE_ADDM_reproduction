device: "auto"
train: # metrics that are calculated during training
  - _target_: src.metrics.ImageMetric
    name: "TRAIN_LPIPS"
    metric: "LPIPS"
  - _target_: src.metrics.ImageMetric
    name: "TRAIN_MSE"
    metric: "MSE"
  - _target_: src.metrics.ImageMetric
    name: "TRAIN_PSNR"
    metric: "PSNR"
  - _target_: src.metrics.ImageMetric
    name: "TRAIN_SSIM"
    metric: "SSIM"
inference: # metrics that are calculated during inference (eval)
  - _target_: src.metrics.ImageMetric
    name: "TEST_LPIPS"
    metric: "LPIPS"
  - _target_: src.metrics.ImageMetric
    name: "TEST_MSE"
    metric: "MSE"
  - _target_: src.metrics.ImageMetric
    name: "TEST_PSNR"
    metric: "PSNR"
  - _target_: src.metrics.ImageMetric
    name: "TEST_SSIM"
    metric: "SSIM"
